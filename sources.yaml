sources:
  # ─── Nhóm A: RSS feed ───────────────────────────────────────────────────────
  - name: vnexpress_giaothong
    type: rss
    url: https://vnexpress.net/rss/giao-thong.rss
    poll_interval_sec: 600
    city_hint: null
    enabled: true

  - name: tuoitre_giaothong
    type: rss
    url: https://tuoitre.vn/rss/giao-thong.rss
    poll_interval_sec: 600
    city_hint: null
    enabled: true

  - name: dantri_thoisux
    type: rss
    url: https://dantri.com.vn/rss/thoi-su.rss
    poll_interval_sec: 600
    city_hint: null
    enabled: true

  - name: thanhnien_thoisux
    type: rss
    url: https://thanhnien.vn/rss/thoi-su.rss
    poll_interval_sec: 600
    city_hint: null
    enabled: true

  - name: vietnamnet_thoisux
    type: rss
    url: https://vietnamnet.vn/thoi-su.rss
    poll_interval_sec: 600
    city_hint: null
    enabled: true

  - name: dantri_giaothong
    type: html
    url: https://dantri.com.vn/thoi-su/giao-thong.htm
    article_selector: "article, div.article-item, div.news-item"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 900
    city_hint: null
    enabled: true

  # ─── Nhóm B: HTML page ──────────────────────────────────────────────────────
  - name: baoxaydung_giaothong
    type: html
    url: https://baoxaydung.vn/giao-thong.htm
    article_selector: "article, div.story, div.box-category-item, div.item"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 1800
    city_hint: null
    enabled: true

  - name: baoxaydung_atgt
    type: html
    url: https://baoxaydung.vn/an-toan-giao-thong.htm
    article_selector: "article, div.story, div.box-category-item, div.item"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 1800
    city_hint: null
    enabled: true

  - name: baoxaydung_gt24h
    type: html
    url: https://baoxaydung.vn/an-toan-giao-thong/giao-thong-24h.htm
    article_selector: "article, div.story, div.box-category-item, div.item"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 1800
    city_hint: null
    enabled: true

  - name: vovgiaothong_home
    type: html
    url: https://vovgiaothong.vn/
    article_selector: "article, div.news-item, div.item, div.box"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 1800
    city_hint: null
    enabled: true

  - name: antd_home
    type: html
    url: https://anninhthudo.vn/
    article_selector: "article, div.news-item, div.item, div.story"
    title_selector: "h3, h2, a"
    link_selector: "a"
    content_selector: null
    poll_interval_sec: 1800
    city_hint: "Hà Nội"
    enabled: true
